{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nico-machine-a-tron.name" . }}
  namespace: {{ include "nico-machine-a-tron.namespace" . }}
  labels:
    {{- include "nico-machine-a-tron.labels" . | nindent 4 }}
spec:
  {{- include "nico-machine-a-tron.serviceMonitorSpec" (dict "name" (include "nico-machine-a-tron.name" .) "monitor" .Values.serviceMonitor "port" "metrics" "namespace" (include "nico-machine-a-tron.namespace" .)) | nindent 2 }}
{{- end }}
