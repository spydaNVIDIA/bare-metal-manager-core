apiVersion: v1
kind: Service
metadata:
  name: {{ include "nico-machine-a-tron.name" . }}-metrics
  namespace: {{ include "nico-machine-a-tron.namespace" . }}
  labels:
    {{- include "nico-machine-a-tron.labels" . | nindent 4 }}
    app.kubernetes.io/metrics: {{ include "nico-machine-a-tron.name" . }}
spec:
  selector:
    {{- include "nico-machine-a-tron.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.metrics.port }}
      name: metrics
      protocol: TCP
