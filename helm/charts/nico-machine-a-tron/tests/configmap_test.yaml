suite: configmap tests
templates:
  - configmap.yaml
tests:
  - it: should create configmap with default machine config
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: nico-machine-a-tron-config-files
      - matchRegex:
          path: data["mat.toml"]
          pattern: "host_count = 10"
      - matchRegex:
          path: data["mat.toml"]
          pattern: "use_single_bmc_mock = true"

  - it: should configure custom host count via pods structure
    set:
      pods:
        default:
          machines:
            dell-hosts:
              hwType: dell_poweredge_r750
              hostCount: 20
              dpuPerHostCount: 2
    asserts:
      - matchRegex:
          path: data["mat.toml"]
          pattern: "host_count = 20"
      - matchRegex:
          path: data["mat.toml"]
          pattern: "dpu_per_host_count = 2"
      - matchRegex:
          path: data["mat.toml"]
          pattern: 'hw_type = "dell_poweredge_r750"'

  - it: should allow full config override via matConfigs
    set:
      configFiles:
        matConfigs:
          default: |
            carbide_api_url = "https://custom-api:443"
            [machines.custom]
            host_count = 5
    asserts:
      - matchRegex:
          path: data["mat.toml"]
          pattern: "custom-api"

  - it: should create per-pod configmaps in multi-pod mode
    set:
      bmcServices:
        enabled: true
      pods:
        mat-0:
          cidr: "10.100.0.0/22"
          machines:
            compute:
              hwType: supermicro_gb300_nvl
              hostCount: 10
        mat-1:
          cidr: "10.100.4.0/22"
          machines:
            compute:
              hwType: supermicro_gb300_nvl
              hostCount: 20
    asserts:
      - hasDocuments:
          count: 2

  - it: should use machineDefaults for all machine groups
    set:
      machineDefaults:
        runIntervalIdle: "30s"
        scoutRunInterval: "120s"
      pods:
        default:
          machines:
            compute:
              hwType: supermicro_gb300_nvl
              hostCount: 5
    asserts:
      - matchRegex:
          path: data["mat.toml"]
          pattern: 'run_interval_idle = "30s"'
      - matchRegex:
          path: data["mat.toml"]
          pattern: 'scout_run_interval = "120s"'
