apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/part-of: dpf-operator-controller-manager
    dpu.nvidia.com/component: dpf-operator-controller-manager
  name: bfbs.provisioning.dpu.nvidia.com
spec:
  group: provisioning.dpu.nvidia.com
  names:
    kind: BFB
    listKind: BFBList
    plural: bfbs
    singular: bfb
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: phase of the bfb
      jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BFB is the Schema for the bfbs API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BFBSpec defines the content of the BFB
            properties:
              fileName:
                description: Specifies the file name where the BFB is downloaded on
                  the volume.
                pattern: ^[A-Za-z0-9\_\-\.]+\.bfb$
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              url:
                description: The url of the bfb image to download.
                pattern: ^(http|https)://.+$
                type: string
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              versions:
                description: |-
                  Optionally specify BFB component versions. When set, these versions are
                  used directly in status instead of being extracted from the BFB file.
                  If set, all four fields (BSP, DOCA, UEFI, ATF) must be provided.
                properties:
                  atf:
                    description: |-
                      ATF (Arm Trusted Firmware) version.
                      Contains the version of ATF, which provides a secure runtime environment
                    type: string
                    x-kubernetes-validations:
                    - message: ATF version is immutable
                      rule: self == oldSelf
                  bsp:
                    description: |-
                      BSP (Board Support Package) version.
                      This field stores the version of the BSP, which provides essential
                      support and drivers for the hardware platform.
                    type: string
                    x-kubernetes-validations:
                    - message: BSP version is immutable
                      rule: self == oldSelf
                  doca:
                    description: |-
                      DOCA version
                      Specifies the version of NVIDIA's Data Center-on-a-Chip Architecture (DOCA),
                      a platform for developing applications on DPUs
                    type: string
                    x-kubernetes-validations:
                    - message: DOCA version is immutable
                      rule: self == oldSelf
                  uefi:
                    description: |-
                      UEFI (Unified Extensible Firmware Interface) version.
                      Indicates the UEFI firmware version, which is responsible for booting
                      the operating system and initializing hardware components
                    type: string
                    x-kubernetes-validations:
                    - message: UEFI version is immutable
                      rule: self == oldSelf
                type: object
                x-kubernetes-validations:
                - message: all four version fields (bsp, doca, uefi, atf) must be
                    provided when versions is set
                  rule: self.bsp != '' && self.doca != '' && self.uefi != '' && self.atf
                    != ''
            required:
            - url
            type: object
            x-kubernetes-validations:
            - message: versions cannot be removed once set
              rule: '!has(oldSelf.versions) || has(self.versions)'
          status:
            default:
              phase: Initializing
            description: BFBStatus defines the observed state of BFB
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of BFB state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              fileName:
                description: |-
                  Filename is the name of the file where the BFB can be accessed on its volume.
                  This is the same as `.spec.Filename` if set.
                type: string
              observedGeneration:
                description: ObservedGeneration records the Generation observed on
                  the object the last time it was patched.
                format: int64
                type: integer
              phase:
                default: Initializing
                description: The current state of BFB.
                enum:
                - Initializing
                - Downloading
                - Ready
                - Deleting
                - Error
                type: string
              versions:
                description: |-
                  BFB versions - BSP, DOCA, UEFI and ATF
                  Holds detailed version information for each component within the BFB
                properties:
                  atf:
                    description: |-
                      ATF (Arm Trusted Firmware) version.
                      Contains the version of ATF, which provides a secure runtime environment
                    type: string
                    x-kubernetes-validations:
                    - message: ATF version is immutable
                      rule: self == oldSelf
                  bsp:
                    description: |-
                      BSP (Board Support Package) version.
                      This field stores the version of the BSP, which provides essential
                      support and drivers for the hardware platform.
                    type: string
                    x-kubernetes-validations:
                    - message: BSP version is immutable
                      rule: self == oldSelf
                  doca:
                    description: |-
                      DOCA version
                      Specifies the version of NVIDIA's Data Center-on-a-Chip Architecture (DOCA),
                      a platform for developing applications on DPUs
                    type: string
                    x-kubernetes-validations:
                    - message: DOCA version is immutable
                      rule: self == oldSelf
                  uefi:
                    description: |-
                      UEFI (Unified Extensible Firmware Interface) version.
                      Indicates the UEFI firmware version, which is responsible for booting
                      the operating system and initializing hardware components
                    type: string
                    x-kubernetes-validations:
                    - message: UEFI version is immutable
                      rule: self == oldSelf
                type: object
            required:
            - phase
            type: object
        type: object
        x-kubernetes-validations:
        - message: name length can't be bigger than 187 chars
          rule: self.metadata.name.size() <= 187
    served: true
    storage: true
    subresources:
      status: {}
